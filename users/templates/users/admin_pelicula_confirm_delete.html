{% extends 'base.html' %}

{% block title %}Eliminar Película{% endblock %}

{% block content %}
<div class="container mt-5">
    <h1>¿Eliminar película?</h1>
    <div class="alert alert-danger">
        <p>Estás a punto de eliminar <strong>{{ pelicula.title }}</strong>.</p>
        <p>Esta acción no se puede deshacer. ¿Estás seguro?</p>
    </div>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger btn-lg">Sí, eliminar</button>
        <a href="{% url 'admin_peliculas' %}" class="btn btn-secondary btn-lg">Cancelar</a>
    </form>
</div>
{% endblock %}
