{% extends 'base.html' %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<div class="container mt-5">
    <h1 class="mb-4">{{ titulo }}</h1>

    <form method="post">
        {% csrf_token %}

        <div class="row">
            <div class="col-md-6">
                <div class="mb-3">
                    <label class="form-label fw-bold">Nombre de usuario</label>
                    <input type="text" name="username" class="form-control form-control-lg" 
                           value="{{ usuario.username|default:'' }}" required placeholder="Ej: juan_cajero">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Email</label>
                    <input type="email" name="email" class="form-control form-control-lg" 
                           value="{{ usuario.email|default:'' }}" placeholder="Ej: juan@ejemplo.com">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Contraseña {% if usuario %} (dejar vacío para no cambiar){% endif %}</label>
                    <input type="password" name="password" class="form-control form-control-lg" 
                           {% if not usuario %}required{% endif %} placeholder="{% if not usuario %}Contraseña obligatoria{% else %}Nueva contraseña (opcional){% endif %}">
                </div>
            </div>

            <div class="col-md-6">
                <div class="mb-3">
                    <label class="form-label fw-bold">Rol</label>
                    <select name="role" class="form-select form-select-lg" required>
                        <option value="" disabled {% if not usuario %}selected{% endif %}>Selecciona un rol</option>
                        {% for value, label in roles %}
                            <option value="{{ value }}" {% if usuario.role == value %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3 form-check mt-4">
                    <input type="checkbox" name="is_active" class="form-check-input" id="is_active" {% if usuario.is_active or not usuario %}checked{% endif %}>
                    <label class="form-check-label fw-bold" for="is_active">Usuario activo (puede iniciar sesión)</label>
                </div>
            </div>
        </div>

        <div class="mt-5 text-end">
            <a href="{% url 'admin_usuarios' %}" class="btn btn-secondary me-3">Cancelar</a>
            <button type="submit" class="btn btn-primary btn-lg px-5">Guardar Usuario</button>
        </div>
    </form>
</div>
{% endblock %}
