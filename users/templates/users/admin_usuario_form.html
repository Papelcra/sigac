{% extends 'base.html' %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}

<style>

/* CONTENEDOR */

.form-page{
background: radial-gradient(circle at top,#2b2d55,#14162b);
min-height:100vh;
padding:60px 20px;
color:white;
}

/* TITULO */

.page-title{
font-size:2.5rem;
font-weight:700;
margin-bottom:35px;
display:flex;
align-items:center;
gap:12px;
}

/* CARD FORM */

.form-card{
background: linear-gradient(145deg,#2a2d5f,#1b1e3a);
border-radius:25px;
padding:40px;
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 30px 60px rgba(0,0,0,.45);
}

/* INPUTS */

.form-control,
.form-select{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.15);
color:white;
border-radius:12px;
padding:12px;
}

.form-control:focus,
.form-select:focus{
background:rgba(255,255,255,0.08);
border-color:#7f00ff;
box-shadow:0 0 10px rgba(127,0,255,.4);
color:white;
}

/* LABEL */

.form-label{
font-weight:600;
margin-bottom:6px;
}

/* CHECKBOX */

.form-check-input{
background-color:#1b1e3a;
border:1px solid rgba(255,255,255,0.3);
}

.form-check-input:checked{
background-color:#7f00ff;
border-color:#7f00ff;
}

/* BOTONES */

.btn-save{
background:linear-gradient(90deg,#7f00ff,#e100ff);
border:none;
border-radius:40px;
padding:12px 35px;
font-weight:600;
color:white;
box-shadow:0 0 20px rgba(168,85,247,.4);
transition:.25s;
}

.btn-save:hover{
transform:translateY(-2px);
box-shadow:0 10px 30px rgba(168,85,247,.7);
color:white;
}

.btn-cancel{
background:#3b3f70;
border:none;
border-radius:40px;
padding:12px 30px;
color:white;
}

.btn-cancel:hover{
background:#2f3360;
color:white;
}

</style>


<div class="form-page">

<div class="container">

<h1 class="page-title">
<i class="bi bi-person-gear"></i>
{{ titulo }}
</h1>

<div class="form-card">

<form method="post">
{% csrf_token %}

<div class="row">

<div class="col-md-6">

<div class="mb-4">
<label class="form-label">Nombre de usuario</label>
<input type="text" name="username" class="form-control"
value="{{ usuario.username|default:'' }}" required
placeholder="Ej: juan_cajero">
</div>

<div class="mb-4">
<label class="form-label">Email</label>
<input type="email" name="email" class="form-control"
value="{{ usuario.email|default:'' }}"
placeholder="Ej: juan@ejemplo.com">
</div>

<div class="mb-4">
<label class="form-label">
Contraseña {% if usuario %}(dejar vacío para no cambiar){% endif %}
</label>
<input type="password" name="password" class="form-control"
{% if not usuario %}required{% endif %}
placeholder="{% if not usuario %}Contraseña obligatoria{% else %}Nueva contraseña (opcional){% endif %}">
</div>

</div>


<div class="col-md-6">

<div class="mb-4">
<label class="form-label">Rol</label>

<select name="role" class="form-select" required>

<option value="" disabled {% if not usuario %}selected{% endif %}>
Selecciona un rol
</option>

{% for value, label in roles %}

<option value="{{ value }}"
{% if usuario.role == value %}selected{% endif %}>
{{ label }}
</option>

{% endfor %}

</select>

</div>


<div class="mb-3 form-check mt-4">

<input type="checkbox"
name="is_active"
class="form-check-input"
id="is_active"
{% if usuario.is_active or not usuario %}checked{% endif %}>

<label class="form-check-label fw-bold" for="is_active">
Usuario activo (puede iniciar sesión)
</label>

</div>

</div>

</div>


<div class="mt-5 text-end">

<a href="{% url 'admin_usuarios' %}" class="btn btn-cancel me-3">
Cancelar
</a>

<button type="submit" class="btn btn-save">
Guardar Usuario
</button>

</div>

</form>

</div>

</div>

</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

{% endblock %}
