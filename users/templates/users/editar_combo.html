{% extends 'base.html' %}

{% block title %}Editar Combo{% endblock %}

{% block content %}

<div class="container mt-5">

<h2 class="mb-4">Editar Combo</h2>

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label class="form-label">Nombre</label>
<input type="text" name="nombre" class="form-control" value="{{ combo.nombre }}">
</div>

<div class="mb-3">
<label class="form-label">Precio</label>
<input type="number" step="0.01" name="precio" class="form-control" value="{{ combo.precio }}">
</div>

<div class="mb-4">
<label class="form-label">Productos del combo</label>

{% for producto in productos %}

<div class="form-check">

<input
class="form-check-input"
type="checkbox"
name="productos"
value="{{ producto.id }}"
{% if producto in combo.productos.all %}checked{% endif %}
>

<label class="form-check-label">
{{ producto.nombre }}
</label>

</div>

{% endfor %}

</div>

<button class="btn btn-primary">
Guardar cambios
</button>

<a href="{% url 'admin_combos' %}" class="btn btn-secondary">
Cancelar
</a>

</form>

</div>

{% endblock %}
