{% extends 'base.html' %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}

<style>

/* ===== FONDO ===== */
body{
background:linear-gradient(135deg,#3a3a55,#1c1c2e);
}

/* ===== CONTENEDOR ===== */
.container{
display:flex;
justify-content:center;
}

/* ===== CARD ===== */
.dashboard-card{
background:linear-gradient(145deg,#3f3f4a,#2f2f3a);
border-radius:28px;
padding:45px;
box-shadow:0 35px 80px rgba(0,0,0,0.6);
border:1px solid rgba(255,255,255,0.08);
position:relative;
color:white;
}

/* ===== HEADER GRADIENTE ===== */
.dashboard-card::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:95px;
border-top-left-radius:28px;
border-top-right-radius:28px;
background:linear-gradient(90deg,#7f00ff,#e100ff);
z-index:0;
}

/* ===== TITULO ===== */
.dashboard-title{
position:relative;
z-index:1;
color:white;
font-weight:600;
text-align:center;
}

/* ===== HR ===== */
.dashboard-card hr{
border-top:2px solid rgba(255,255,255,0.2);
position:relative;
z-index:1;
}

/* ===== LABELS ===== */
.form-label{
color:#e3d9ff;
font-weight:600;
}

/* ===== INPUTS ===== */
.form-control{
background:rgba(255,255,255,0.15);
border:none;
border-radius:14px;
color:white;
padding:5px 10px;
}

.form-control::placeholder{
color:rgba(255,255,255,0.6);
}

.form-control:focus{
background:rgba(255,255,255,0.25);
box-shadow:0 0 0 3px rgba(255,255,255,0.2);
outline:none;
color:white;
}

/* ===== BOTÓN GUARDAR ===== */
.btn-purple{
background:linear-gradient(90deg,#00c6ff,#0072ff);
border:none;
color:white;
font-weight:200;
border-radius:40px;
padding:10px 30px;
transition:.3s;
}

.btn-purple:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* ===== BOTÓN CANCELAR ===== */
.btn-cancel{
background:transparent;
border:2px solid rgba(255,255,255,0.6);
color:white;
border-radius:40px;
padding:10px 26px;
}

.btn-cancel:hover{
background:rgba(255,255,255,0.15);
}

/* ===== CHECKBOX ===== */
.form-check{
margin-top:20px;
display:flex;
align-items:center;
gap:8px;
}

.form-check input{
accent-color:#d946ef;
}

</style>


<div class="container mt-5 mb-2 py-4">

<div class="dashboard-card mx-auto col-lg-8">

<h1 class="mb-4 dashboard-title">
{{ titulo }}
</h1>

<hr class="mb-4">

<form method="post">
{% csrf_token %}

<div class="row">

<div class="col-md-6">

<div class="mb-4">
<label class="form-label fw-bold">Nombre de la sala</label>
<input type="text" 
name="name" 
class="form-control form-control-lg"
value="{{ sala.name|default:'' }}" 
required 
placeholder="Ej: Sala 1">
</div>

<div class="mb-4">
<label class="form-label fw-bold">Capacidad total (personas)</label>
<input type="number" 
name="capacity" 
class="form-control form-control-lg" 
min="1"
value="{{ sala.capacity|default:'' }}" 
required 
placeholder="Ej: 100">

<small class="text-light">
Los asientos se generarán automáticamente al guardar.
</small>

</div>

</div>

</div>

<div class="mt-5 text-end">

<a href="{% url 'admin_salas' %}" 
class="btn btn-cancel me-3 px-4">
Cancelar
</a>

<button type="submit" 
class="btn btn-purple btn-lg px-5">
Guardar Sala
</button>

</div>

</form>

</div>

</div>

{% endblock %}
