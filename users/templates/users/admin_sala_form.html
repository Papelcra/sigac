{% extends 'base.html' %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}

<style>
/* ===== FONDO GENERAL OSCURO ===== */
body {
    background: linear-gradient(135deg, #50507e, #33436f);
}

/* ===== CARD PRINCIPAL MÁS ATRACTIVA ===== */
.dashboard-card {
    background: linear-gradient(145deg, #24243e, #2e2e5e);
    border-radius: 22px;
    padding: 45px;
    box-shadow: 
        0 25px 50px rgba(144, 45, 157, 0.6),
        inset 0 1px 0 rgba(123, 203, 249, 0.05);
    border: 1px solid hsla(194, 94%, 82%, 0.15);
    animation: fadeIn 0.5s ease-in-out;
    position: relative;
}

/* Línea decorativa superior sutil */
.dashboard-card::before {
    content: "";
    position: relative;
    top: 0;
    left: 0;
    width: 100%;
    height: 4px;
    border-top-left-radius: 12px;
    border-top-right-radius: 12px;
    background: linear-gradient(90deg, #ddd6f0, #ddb4ff, #c089f0);
}

/* ===== TITULO ===== */
.dashboard-title {
    color: #e0d4ff;
    font-weight: 600;
    letter-spacing: 0.5px;
}

/* ===== LABELS ===== */
.form-label {
    color: #d6cfff;
}

/* ===== INPUTS OSCUROS ===== */
.form-control {
    background-color: #2f2f5a;
    border: 1px solid #3f3f6b;
    border-radius: 12px;
    color: white;
    transition: 0.3s ease;
}

.form-control::placeholder {
    color: #b5b5c5;
}

.form-control:focus {
    background-color: #373773;
    border-color: #9d4edd;
    box-shadow: 0 0 15px rgba(157, 78, 221, 0.35);
    color: white;
}

/* ===== BOTÓN PRINCIPAL ===== */
.btn-purple {
    background: linear-gradient(45deg, #9d4edd, #7b2cbf);
    border: none;
    color: white;
    font-weight: 600;
    border-radius: 12px;
    transition: 0.3s ease;
}

.btn-purple:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(157, 78, 221, 0.4);
}

/* ===== BOTÓN CANCELAR ===== */
.btn-cancel {
    background-color: #3a3a5a;
    color: #fff;
    border: none;
    border-radius: 12px;
}

.btn-cancel:hover {
    background-color: #2c2c4a;
}

/* ===== ANIMACIÓN ===== */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>

<div class="container mt-5 mb-2 py-4">
    <div class="dashboard-card mx-auto col-lg-8">

        <h1 class="mb-4 dashboard-title">
            {{ titulo }}
        </h1>

        <hr class="mb-4" style="border-top: 2px solid #e0c3fc;">

        <form method="post">
            {% csrf_token %}

            <div class="row">
                <div class="col-md-6">

                    <div class="mb-4">
                        <label class="form-label fw-bold">Nombre de la sala</label>
                        <input type="text" 
                               name="name" 
                               class="form-control form-control-lg"
                               value="{{ sala.name|default:'' }}" 
                               required 
                               placeholder="Ej: Sala 1">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Capacidad total (personas)</label>
                        <input type="number" 
                               name="capacity" 
                               class="form-control form-control-lg" 
                               min="1"
                               value="{{ sala.capacity|default:'' }}" 
                               required 
                               placeholder="Ej: 100">
                        <small class="text-muted">
                            Los asientos se generarán automáticamente al guardar.
                        </small>
                    </div>

                </div>
            </div>

            <div class="mt-5 text-end">
                <a href="{% url 'admin_salas' %}" 
                   class="btn btn-cancel me-3 px-4">
                    Cancelar
                </a>

                <button type="submit" 
                        class="btn btn-purple btn-lg px-5">
                    Guardar Sala
                </button>
            </div>

        </form>

    </div>
</div>

{% endblock %}
