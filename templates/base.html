<!DOCTYPE html>
<html lang="es">
    <style>
        /* Navbar más compacta */
.navbar-custom {
    padding-top: 6px;
    padding-bottom: 6px;
    min-height: 50px;
}

/* Reducir tamaño del brand */
.navbar-custom .navbar-brand {
    font-size: 1rem;
    padding-top: 0;
    padding-bottom: 0;
}

/* Reducir tamaño de los links */
.navbar-custom .nav-link {
    font-size: 0.9rem;
    padding-top: 6px;
    padding-bottom: 6px;
}

/* Si tiene botón toggler */
.navbar-custom .navbar-toggler {
    padding: 4px 8px;
}
    </style>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SIGAC - Sistema de Gestión de Cine{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #464545, #1c1c2b);
            color: #f1f1f1;
}

        .navbar-custom {
            background: linear-gradient(90deg, #0d6efd, #6610f2);
        }

        .footer-custom {
            background-color: #1b1b1b;
            border-top: 1px solid rgba(65, 63, 63, 0.05);
        }

        .shadow-xl {
            box-shadow: 0 20px 60px rgba(160, 160, 160, 0.6);
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

{% if not request.path == '/login/' %}
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-xl fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🎬 SIGAC</a>

        <div class="ms-auto">
            {% if user.is_authenticated %}
                <form method="post" action="{% url 'logout' %}" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-light btn-sm fw-semibold">
                        Cerrar Sesión
                    </button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-light btn-sm fw-semibold">
                    Iniciar Sesión
                </a>
            {% endif %}
        </div>
    </div>
</nav>
{% endif %}

{% block content %}{% endblock %}

<footer class="footer-custom text-center  shadow-xl fixed-bottom">
    <small>© 2026 SIGAC - Sistema Integral de Gestión de Cine</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
