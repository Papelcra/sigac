<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}SIGAC - Sistema de Gestión de Cine{% endblock %}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">


<style>

/* ===== BODY ===== */
body{
font-family:'Poppins',sans-serif;
background: linear-gradient(135deg,#464545,#1c1c2b);
color:#f1f1f1;
padding-top:65px;
}

/* ===== NAVBAR PROFESIONAL ===== */
.navbar-custom{

padding-top:8px;
padding-bottom:8px;

background: linear-gradient(90deg,#6a11cb,#3b0f63,#000000);

box-shadow:
0 8px 30px rgba(106,17,203,0.5),
0 2px 10px rgba(0,0,0,0.6);

backdrop-filter: blur(8px);

transition: all 0.3s ease;
}

/* línea brillante superior */
.navbar-custom::after{
content:"";
position:absolute;
left:0;
bottom:0;
width:100%;
height:2px;
background: linear-gradient(90deg,#c77dff,#9d4edd,#7b2cbf);
}

/* LOGO */
.navbar-brand{

font-weight:700;

letter-spacing:1px;

font-size:1.1rem;

color:#f3e8ff !important;

transition:0.3s;
}

.navbar-brand:hover{

color:#c77dff !important;

transform: scale(1.05);

}

/* LINKS */
.navbar-custom .nav-link{

font-size:0.9rem;

color:#e5dbff !important;

margin-left:10px;

transition:0.25s;

}

.navbar-custom .nav-link:hover{

color:#c77dff !important;

transform: translateY(-1px);

}

/* BOTON LOGIN / LOGOUT */
.btn-light{

background: linear-gradient(45deg,#c77dff,#9d4edd);

border:none;

color:white;

font-weight:600;

border-radius:10px;

padding:5px 14px;

transition:0.3s;

}

.btn-light:hover{

transform: translateY(-2px);

box-shadow:0 6px 18px rgba(157,78,221,0.5);

}

/* ===== FOOTER ===== */
.footer-custom{

background:#111;

border-top:1px solid rgba(255,255,255,0.05);

padding:8px;

color:#aaa;

}

/* ===== SOMBRA GENERAL ===== */
.shadow-xl{

box-shadow:0 20px 60px rgba(0,0,0,0.6);

}

</style>

{% block extra_css %}{% endblock %}
</head>

<body>

{% if not request.path == '/login/' %}
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
<div class="container">

<a class="navbar-brand" href="/">
🎬 SIGAC
</a>

<div class="ms-auto">

{% if user.is_authenticated %}

<form method="post" action="{% url 'logout' %}" class="d-inline">

{% csrf_token %}

<button type="submit" class="btn btn-light btn-sm">

Cerrar Sesión

</button>

</form>

{% else %}

<a href="{% url 'login' %}" class="btn btn-light btn-sm">

Iniciar Sesión

</a>

{% endif %}

</div>

</div>
</nav>
{% endif %}

{% block content %}{% endblock %}

<footer class="footer-custom text-center fixed-bottom">
<small>© 2026 SIGAC - Sistema Integral de Gestión de Cine</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
